<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mitiphy — Lite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light dark; --bg: #fff; --fg: #111; --muted: #666; --border: #ddd; --accent: #1a73e8; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0e0e10; --fg: #eee; --muted: #aaa; --border: #333; --accent: #6ab0ff; } }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--fg); margin: 0; padding: 2em; max-width: 920px; margin-left: auto; margin-right: auto; line-height: 1.5; }
    h1 { margin-top: 0; }
    h1 a { color: var(--fg); text-decoration: none; }
    .badge { display: inline-block; padding: 0.1em 0.6em; border-radius: 1em; background: var(--accent); color: #fff; font-size: 0.75em; vertical-align: middle; }
    form { display: flex; gap: 0.5em; margin: 1em 0; flex-wrap: wrap; }
    input[type=text], textarea { flex: 1 1 280px; padding: 0.5em 0.7em; border: 1px solid var(--border); border-radius: 0.3em; background: var(--bg); color: var(--fg); }
    button { padding: 0.5em 1.1em; border: 0; border-radius: 0.3em; background: var(--accent); color: #fff; cursor: pointer; font-weight: 600; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .card { border: 1px solid var(--border); border-radius: 0.5em; padding: 1em; margin-top: 1em; }
    .muted { color: var(--muted); font-size: 0.9em; }
    pre { white-space: pre-wrap; word-wrap: break-word; background: rgba(127,127,127,0.1); padding: 0.7em; border-radius: 0.3em; max-height: 400px; overflow: auto; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid var(--border); padding: 0.4em 0.6em; text-align: left; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <h1><a href="/">Mitiphy</a> <span class="badge">Lite</span></h1>
  <p class="muted">Self-hosted OSINT + threat-intelligence platform. Everything runs on your own machine.</p>

  <form id="investigate-form">
    <input type="text" id="target" placeholder="email / domain / ip / url / hash..." required>
    <button type="submit">Investigate</button>
  </form>

  <div id="status" class="muted"></div>
  <div id="result"></div>

  <h2>Recent cases</h2>
  <div id="cases" class="muted">loading...</div>

  <p class="muted" style="margin-top:3em;">API: <code>/healthz</code> · <code>/readyz</code> · <code>/version</code> · <code>/investigate</code> · <code>/cases</code> · <code>/audit/verify</code></p>

<script>
const $ = (id) => document.getElementById(id);

async function refreshCases() {
  try {
    const res = await fetch("/cases");
    const data = await res.json();
    if (!data.length) {
      $("cases").innerHTML = "<em>No cases yet.</em>";
      return;
    }
    const rows = data.slice(0, 20).map(c => `<tr><td><a href="/cases/${c.case_id}/report.html" target="_blank">${c.case_id}</a></td><td><code>${c.path}</code></td></tr>`).join("");
    $("cases").innerHTML = `<table><thead><tr><th>Case</th><th>Path</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch (e) {
    $("cases").textContent = "Failed to load cases.";
  }
}

$("investigate-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const target = $("target").value.trim();
  if (!target) return;
  $("status").textContent = "Running investigation (this can take a moment for live network calls)...";
  $("result").innerHTML = "";
  try {
    const res = await fetch("/investigate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({target, notes: ""}),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const score = data.score.score;
    $("status").textContent = "";
    $("result").innerHTML = `
      <div class="card">
        <strong>Case ${data.case_id}</strong><br>
        Score: <strong>${score.toFixed(1)}/100</strong><br>
        Observations: ${data.observation_count}<br>
        ATT&amp;CK matches: ${data.techniques.length}<br>
        <a href="/cases/${data.case_id}/report.html" target="_blank">Open HTML report</a>
      </div>
      <details class="card"><summary>Score breakdown</summary><pre>${escapeHtml(JSON.stringify(data.score, null, 2))}</pre></details>
    `;
    refreshCases();
  } catch (err) {
    $("status").textContent = "Error: " + err.message;
  }
});

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

refreshCases();
</script>
</body>
</html>
